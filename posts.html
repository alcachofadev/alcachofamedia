<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcachofamedia – Película</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #12121a;
      --card:    #1a1a26;
      --border:  #2a2a40;
      --accent:  #e8c547;
      --accent2: #ff4e50;
      --text:    #e8e8f0;
      --muted:   #6b6b8a;
      --youtube: #ff0000;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: .6;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: .12em;
      color: var(--accent); text-decoration: none;
    }
    .logo span { color: var(--accent2); }
    .back-btn {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--muted); text-decoration: none;
      padding: .35rem .75rem; border: 1px solid var(--border);
      border-radius: 5px;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    .hero { position: relative; height: 340px; overflow: hidden; display: flex; align-items: flex-end; }
    .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center 20%; filter: brightness(.35) blur(3px); }
    .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 60%); }
    .hero-content { position: relative; z-index: 2; max-width: 1280px; width: 100%; margin: 0 auto; padding: 0 1.5rem 2rem; }
    .hero-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 5vw, 3.8rem); letter-spacing: .06em; text-shadow: 0 2px 20px rgba(0,0,0,.8); }
    .hero-meta { display: flex; align-items: center; gap: .75rem; margin-top: .5rem; flex-wrap: wrap; }
    .hero-meta span { font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--muted); }
    .hero-meta .pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: .2rem .6rem; font-size: .65rem; color: var(--text); }
    .hero-meta .pill.accent { background: var(--accent); color: #000; border-color: var(--accent); }

    .page { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 1fr 280px; gap: 2rem; align-items: start; }
    .main-col { display: flex; flex-direction: column; gap: 2rem; }
    .top-row { display: flex; gap: 1.75rem; align-items: flex-start; }
    .poster-wrap { flex-shrink: 0; width: 180px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,.6); }
    .poster-wrap img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
    .info-wrap { flex: 1; display: flex; flex-direction: column; gap: 1rem; padding-top: .25rem; }
    .dl-main { display: inline-flex; align-items: center; gap: .5rem; background: var(--accent); color: #000; font-family: 'Space Mono', monospace; font-weight: 700; font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; padding: .65rem 1.4rem; border-radius: 6px; text-decoration: none; width: fit-content; transition: background .2s, transform .15s; }
    .dl-main:hover { background: #f5d55a; transform: translateY(-1px); }
    .ratings { display: flex; gap: 1rem; flex-wrap: wrap; }
    .rating-chip { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .75rem; display: flex; flex-direction: column; align-items: center; gap: .1rem; }
    .rating-chip .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--accent); }
    .rating-chip .lbl { font-family: 'Space Mono', monospace; font-size: .55rem; color: var(--muted); text-transform: uppercase; }
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: .12em; color: var(--accent); margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
    .synopsis-text { font-size: .9rem; line-height: 1.75; color: #c8c8d8; font-style: italic; }
    .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem .75rem; }
    .ficha-item { display: flex; flex-direction: column; gap: .15rem; padding: .5rem .6rem; border-radius: 5px; background: var(--surface); }
    .ficha-key { font-family: 'Space Mono', monospace; font-size: .58rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .ficha-val { font-size: .84rem; color: var(--text); }
    .yt-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 6px; background: #000; }
    .yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .sidebar-col { display: flex; flex-direction: column; gap: 1.25rem; position: sticky; top: 80px; }
    .side-block { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem; }
    .side-block h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .12em; color: var(--accent); margin-bottom: .85rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
    .related-list { display: flex; flex-direction: column; gap: .75rem; }
    .related-item { display: flex; gap: .7rem; align-items: center; text-decoration: none; color: var(--text); padding: .4rem; border-radius: 6px; transition: background .2s; }
    .related-item:hover { background: var(--surface); }
    .related-thumb { width: 52px; aspect-ratio: 2/3; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); }
    .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .related-info { flex: 1; min-width: 0; }
    .related-title { font-size: .78rem; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .related-year { font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--muted); margin-top: .1rem; }
    .tag-pills { display: flex; flex-wrap: wrap; gap: .35rem; }
    .tag-pill { font-family: 'Space Mono', monospace; font-size: .62rem; padding: .25rem .55rem; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); text-decoration: none; transition: all .2s; }
    .tag-pill:hover { color: var(--text); border-color: var(--muted); }
    footer { border-top: 1px solid var(--border); margin-top: 3rem; padding: 1.5rem; text-align: center; font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted); letter-spacing: .08em; }

    @media (max-width: 900px) { .page { grid-template-columns: 1fr; } .sidebar-col { position: static; } .ficha-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { nav { padding: 0 1rem; } .logo { font-size: 1.4rem; } .top-row { flex-direction: column; align-items: center; } .poster-wrap { width: 140px; } }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Alca<span>chofa</span>media</a>
  <a class="back-btn" href="index.html">← Inicio</a>
</nav>

<div class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <h1 id="heroTitle">Cargando…</h1>
    <div class="hero-meta" id="heroMeta"></div>
  </div>
</div>

<div class="page">
  <div class="main-col">
    <div class="top-row">
      <div class="poster-wrap">
        <img id="mainPoster" src="" alt="Poster" />
      </div>
      <div class="info-wrap">
        <a class="dl-main" id="dlLink" href="#">⬇ Descargar película</a>
        <div class="ratings" id="ratingsRow"></div>
        <div class="tag-pills" id="movieTags"></div>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Sinopsis</p>
      <p class="synopsis-text" id="sinopsis">Cargando sinopsis…</p>
    </div>

    <div class="section">
      <p class="section-title">Ficha técnica</p>
      <div class="ficha-grid" id="fichaGrid"></div>
    </div>

    <div class="section">
      <p class="section-title">Tráiler oficial</p>
      <div class="yt-wrap">
        <iframe id="trailerFrame" src="" title="Tráiler" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <aside class="sidebar-col">
    <div class="side-block">
      <h3>Películas relacionadas</h3>
      <div class="related-list" id="relatedList"></div>
    </div>
    <div class="side-block">
      <h3>Tags</h3>
      <div class="tag-pills" id="sidebarTags"></div>
    </div>
  </aside>
</div>

<footer>© 2026 Alcachofamedia · Todos los derechos reservados</footer>

<script>
  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  async function init() {
    const id = parseInt(getParam('id') || '1');
    
    try {
      // Cargar posts.json directamente (NO /api/posts)
      const response = await fetch('posts.json');
      const posts = await response.json();
      const movie = posts.find(p => p.id === id);
      
      if (!movie) {
        document.getElementById('heroTitle').textContent = 'Película no encontrada';
        return;
      }
      
      // Actualizar título de la página
      document.title = `Alcachofamedia – ${movie.title}`;
      
      // Hero Background
      document.getElementById('heroBg').style.backgroundImage = `url('${movie.poster}')`;
      document.getElementById('heroTitle').textContent = movie.title;
      
      // Hero Meta (año, tags, destacado)
      const heroMeta = document.getElementById('heroMeta');
      heroMeta.innerHTML = `
        <span>${movie.year}</span>
        ${movie.featured ? '<span class="pill accent">⭐ Destacado</span>' : ''}
        ${(movie.tags || []).map(t => `<span class="pill">${t}</span>`).join('')}
      `;
      
      // Poster y descarga
      document.getElementById('mainPoster').src = movie.poster;
      document.getElementById('mainPoster').alt = movie.title;
      document.getElementById('dlLink').href = movie.download || '#';
      
      // Ratings
      const ratings = movie.ratings || {};
      const ratingsRow = document.getElementById('ratingsRow');
      ratingsRow.innerHTML = '';
      if (ratings.imdb) ratingsRow.innerHTML += `<div class="rating-chip"><span class="val">${ratings.imdb}</span><span class="lbl">IMDb</span></div>`;
      if (ratings.rt) ratingsRow.innerHTML += `<div class="rating-chip"><span class="val">${ratings.rt}</span><span class="lbl">Rotten T.</span></div>`;
      if (ratings.meta) ratingsRow.innerHTML += `<div class="rating-chip"><span class="val">${ratings.meta}</span><span class="lbl">Metacritic</span></div>`;
      
      // Tags de la película
      document.getElementById('movieTags').innerHTML = (movie.tags || []).map(t => `<a class="tag-pill" href="index.html">${t}</a>`).join('');
      
      // Sinopsis
      document.getElementById('sinopsis').textContent = movie.synopsis || 'Sin sinopsis disponible.';
      
      // Ficha técnica
      const ficha = movie.ficha || {};
      const fichaGrid = document.getElementById('fichaGrid');
      fichaGrid.innerHTML = '';
      const fichaFields = [
        ['Director', ficha.director], ['Guionista', ficha.guionista], ['Duración', ficha.duracion],
        ['País', ficha.pais], ['Idioma', ficha.idioma], ['Estudio', ficha.estudio],
        ['Formato', ficha.formato], ['Calidad', ficha.calidad]
      ];
      fichaFields.forEach(([key, val]) => {
        if (val) {
          fichaGrid.innerHTML += `<div class="ficha-item"><span class="ficha-key">${key}</span><span class="ficha-val">${val}</span></div>`;
        }
      });
      
      // YouTube Trailer
      if (movie.youtubeId) {
        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${movie.youtubeId}?rel=0`;
      } else {
        const trailerSection = document.querySelector('.section:last-of-type');
        if (trailerSection) trailerSection.style.display = 'none';
      }
      
      // Películas relacionadas (mismos tags)
      const related = posts.filter(p => p.id !== movie.id && (p.tags || []).some(t => (movie.tags || []).includes(t))).slice(0, 6);
      const relatedList = document.getElementById('relatedList');
      if (related.length === 0) {
        relatedList.innerHTML = '<p style="color:var(--muted);font-size:.78rem;">Sin sugerencias aún.</p>';
      } else {
        relatedList.innerHTML = related.map(r => `
          <a class="related-item" href="post.html?id=${r.id}">
            <div class="related-thumb"><img src="${r.poster}" alt="${r.title}" onerror="this.src='https://via.placeholder.com/52x78/1a1a26/6b6b8a?text=?'"></div>
            <div class="related-info"><p class="related-title">${r.title}</p><p class="related-year">${r.year}</p></div>
          </a>
        `).join('');
      }
      
      // Tags sidebar (todos los tags únicos)
      const allTags = [...new Set(posts.flatMap(p => p.tags || []))].sort();
      document.getElementById('sidebarTags').innerHTML = allTags.map(t => `<a class="tag-pill" href="index.html">${t}</a>`).join('');
      
    } catch (error) {
      console.error('Error:', error);
      document.getElementById('heroTitle').textContent = 'Error al cargar datos';
    }
  }
  
  init();
</script>
</body>
</html>
