<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Todo el head y estilos que ya tenías -->
     <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcachofamedia – Película</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #12121a;
      --card:    #1a1a26;
      --border:  #2a2a40;
      --accent:  #e8c547;
      --accent2: #ff4e50;
      --text:    #e8e8f0;
      --muted:   #6b6b8a;
      --youtube: #ff0000;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: .6;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: .12em;
      color: var(--accent); text-decoration: none; white-space: nowrap; flex-shrink: 0;
    }
    .logo span { color: var(--accent2); }

    /* tag-menu in navbar */
    .nav-tags {
      display: flex; align-items: center; gap: .25rem;
      list-style: none; flex-wrap: nowrap; overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tags::-webkit-scrollbar { display: none; }
    .nav-tags a {
      font-family: 'Space Mono', monospace;
      font-size: .68rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); text-decoration: none;
      padding: .35rem .8rem; border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap; transition: all .2s;
    }
    .nav-tags a:hover { color: var(--text); border-color: var(--border); }
    .nav-tags a.active { color: #000; background: var(--accent); border-color: var(--accent); }

    .nav-search {
      flex: 1; max-width: 280px; position: relative; margin-left: auto;
    }
    .nav-search input {
      width: 100%; background: var(--card);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .4rem 2.2rem .4rem .8rem;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .82rem;
      outline: none; transition: border-color .2s;
    }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-search input:focus { border-color: var(--accent); }
    .nav-search span { position: absolute; right: .7rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: .85rem; }

    .back-btn {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--muted); text-decoration: none;
      padding: .35rem .75rem; border: 1px solid var(--border);
      border-radius: 5px; transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── HERO BANNER ── */
    .hero {
      position: relative; height: 340px; overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center 20%;
      filter: brightness(.35) blur(3px);
      transform: scale(1.05);
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--bg) 0%, transparent 60%);
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 1280px; width: 100%;
      margin: 0 auto; padding: 0 1.5rem 2rem;
    }
    .hero-content h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      letter-spacing: .06em; line-height: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,.8);
    }
    .hero-meta {
      display: flex; align-items: center; gap: .75rem;
      margin-top: .5rem; flex-wrap: wrap;
    }
    .hero-meta span {
      font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--muted);
    }
    .hero-meta .pill {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: .2rem .6rem;
      font-size: .65rem; color: var(--text);
    }
    .hero-meta .pill.accent { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── PAGE LAYOUT ── */
    .page {
      max-width: 1280px; margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem; align-items: start;
    }

    /* ── MAIN COLUMN ── */
    .main-col { display: flex; flex-direction: column; gap: 2rem; }

    /* poster + info row */
    .top-row { display: flex; gap: 1.75rem; align-items: flex-start; }

    .poster-wrap {
      flex-shrink: 0; width: 180px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .poster-wrap img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }

    .info-wrap { flex: 1; display: flex; flex-direction: column; gap: 1rem; padding-top: .25rem; }

    /* Download button */
    .dl-main {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent); color: #000;
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: .75rem; letter-spacing: .08em; text-transform: uppercase;
      padding: .65rem 1.4rem; border-radius: 6px;
      text-decoration: none; width: fit-content;
      transition: background .2s, transform .15s;
    }
    .dl-main:hover { background: #f5d55a; transform: translateY(-1px); }

    /* Ratings row */
    .ratings {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .rating-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: .4rem .75rem;
      display: flex; flex-direction: column; align-items: center; gap: .1rem;
    }
    .rating-chip .val {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--accent);
    }
    .rating-chip .lbl {
      font-family: 'Space Mono', monospace; font-size: .55rem; color: var(--muted); text-transform: uppercase;
    }

    /* ── SECTIONS ── */
    .section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem; letter-spacing: .12em; color: var(--accent);
      margin-bottom: 1rem; padding-bottom: .6rem;
      border-bottom: 1px solid var(--border);
    }
    .synopsis-text {
      font-size: .9rem; line-height: 1.75; color: #c8c8d8;
      font-style: italic;
    }

    /* Ficha técnica */
    .ficha-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: .5rem .75rem;
    }
    .ficha-item {
      display: flex; flex-direction: column; gap: .15rem;
      padding: .5rem .6rem; border-radius: 5px; background: var(--surface);
    }
    .ficha-key {
      font-family: 'Space Mono', monospace; font-size: .58rem;
      text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    }
    .ficha-val { font-size: .84rem; color: var(--text); }

    /* YouTube embed */
    .yt-wrap {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      border-radius: 6px; background: #000;
    }
    .yt-wrap iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }

    /* ── SIDEBAR ── */
    .sidebar-col { display: flex; flex-direction: column; gap: 1.25rem; position: sticky; top: 80px; }

    .side-block {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.1rem;
    }
    .side-block h3 {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      letter-spacing: .12em; color: var(--accent);
      margin-bottom: .85rem; padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    /* Related movies */
    .related-list { display: flex; flex-direction: column; gap: .75rem; }
    .related-item {
      display: flex; gap: .7rem; align-items: center;
      text-decoration: none; color: var(--text);
      padding: .4rem; border-radius: 6px; transition: background .2s;
    }
    .related-item:hover { background: var(--surface); }
    .related-thumb {
      width: 52px; aspect-ratio: 2/3; border-radius: 4px;
      overflow: hidden; flex-shrink: 0; background: var(--surface);
      border: 1px solid var(--border);
    }
    .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .related-info { flex: 1; min-width: 0; }
    .related-title {
      font-size: .78rem; font-weight: 500; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .related-year { font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--muted); margin-top: .1rem; }

    /* Tags in sidebar */
    .tag-pills { display: flex; flex-wrap: wrap; gap: .35rem; }
    .tag-pill {
      font-family: 'Space Mono', monospace; font-size: .62rem;
      padding: .25rem .55rem; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); text-decoration: none; transition: all .2s;
    }
    .tag-pill:hover { color: var(--text); border-color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); margin-top: 3rem;
      padding: 1.5rem; text-align: center;
      font-family: 'Space Mono', monospace; font-size: .65rem;
      color: var(--muted); letter-spacing: .08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .sidebar-col { position: static; }
      .related-list { flex-direction: row; flex-wrap: wrap; }
      .related-item { flex-direction: column; width: 100px; }
      .related-thumb { width: 100%; aspect-ratio: 2/3; }
      .related-title { white-space: normal; font-size: .72rem; }
      .ficha-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      nav { padding: 0 1rem; gap: .75rem; }
      .nav-tags { display: none; }
      .logo { font-size: 1.4rem; }
      .top-row { flex-direction: column; }
      .poster-wrap { width: 140px; }
    }
  </style>
</head>
<body>
  <!-- Todo el HTML que ya tenías -->

<!-- ── NAVBAR ────────────────────────────── -->
<nav>
  <a class="logo" href="index.html">Alca<span>chofa</span>media</a>

  <ul class="nav-tags" id="navTags">
    <!-- Se llenan dinámicamente -->
  </ul>

  <div class="nav-search">
    <input type="text" id="searchInput" placeholder="Buscar…" autocomplete="off" />
    <span>🔍</span>
  </div>

  <a class="back-btn" href="index.html">← Inicio</a>
</nav>

<!-- ── HERO ──────────────────────────────── -->
<div class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <h1 id="heroTitle">Cargando…</h1>
    <div class="hero-meta" id="heroMeta"></div>
  </div>
</div>

<!-- ── PAGE ──────────────────────────────── -->
<div class="page">

  <!-- MAIN -->
  <div class="main-col">

    <!-- Poster + botón descarga + ratings -->
    <div class="top-row">
      <div class="poster-wrap">
        <img id="mainPoster" src="" alt="Poster" />
      </div>
      <div class="info-wrap">
        <a class="dl-main" id="dlLink" href="#">⬇ Descargar película</a>
        <div class="ratings" id="ratingsRow"></div>
        <div class="tag-pills" id="movieTags"></div>
      </div>
    </div>

    <!-- Sinopsis -->
    <div class="section">
      <p class="section-title">Sinopsis</p>
      <p class="synopsis-text" id="sinopsis">Cargando sinopsis…</p>
    </div>

    <!-- Ficha técnica -->
    <div class="section">
      <p class="section-title">Ficha técnica</p>
      <div class="ficha-grid" id="fichaGrid"></div>
    </div>

    <!-- Tráiler YouTube -->
    <div class="section">
      <p class="section-title">Tráiler oficial</p>
      <div class="yt-wrap">
        <iframe id="trailerFrame"
          src=""
          title="Tráiler"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar-col">

    <div class="side-block">
      <h3>Películas relacionadas</h3>
      <div class="related-list" id="relatedList">
        <!-- se llenan dinámicamente -->
      </div>
    </div>

    <div class="side-block">
      <h3>Tags</h3>
      <div class="tag-pills" id="sidebarTags"></div>
    </div>

  </aside>
</div>

<footer>© 2026 Alcachofamedia · Todos los derechos reservados</footer>
  
  <script>
   // Función para obtener el ID de la URL (ej: posts.html?id=6)
function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

async function init() {
    const id = parseInt(getParam('id'));
    if (!id) {
        window.location.href = 'index.html';
        return;
    }

    try {
        // 1. Cargar el JSON (Asegúrate de que la ruta sea correcta)
        const res = await fetch('posts.json');
        const posts = await res.json();

        // 2. Buscar la película por ID
        const movie = posts.find(p => p.id === id);

        if (!movie) {
            document.getElementById('heroTitle').textContent = 'Película no encontrada';
            return;
        }

        // 3. Llenar la información en el HTML
        document.title = `${movie.title} - Alcachofamedia`;
        document.getElementById('heroTitle').textContent = movie.title;
        document.getElementById('mainPoster').src = movie.poster;
        document.getElementById('heroBg').style.backgroundImage = `url(${movie.poster})`;
        document.getElementById('sinopsis').textContent = movie.synopsis;
        document.getElementById('dlLink').href = movie.download;

        // 4. Llenar Ficha Técnica
        const fichaGrid = document.getElementById('fichaGrid');
        fichaGrid.innerHTML = Object.entries(movie.ficha).map(([key, value]) => `
            <div class="ficha-item">
                <span class="ficha-key">${key.replace('_', ' ')}</span>
                <span class="ficha-val">${value}</span>
            </div>
        `).join('');

        // 5. Configurar Tráiler (YouTube)
        if (movie.youtubeId && movie.youtubeId !== "#") {
            document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${movie.youtubeId}`;
        } else {
            document.querySelector('.yt-wrap').innerHTML = "<p style='padding:20px; color:var(--muted)'>Tráiler no disponible</p>";
        }

        // 6. Llenar Ratings
        const ratingsRow = document.getElementById('ratingsRow');
        ratingsRow.innerHTML = Object.entries(movie.ratings).map(([site, val]) => `
            <div class="rating-chip">
                <span class="val">${val}</span>
                <span class="lbl">${site}</span>
            </div>
        `).join('');

            // 7. Generar Películas Relacionadas (mismo género)
        const relatedGrid = document.getElementById('relatedList');
        const related = posts
            .filter(p => p.id !== movie.id && p.tags.some(t => movie.tags.includes(t)))
            .slice(0, 4);

        relatedGrid.innerHTML = related.map(p => `
            <a href="posts.html?id=${p.id}" class="related-item">
                <div class="related-thumb">
                    <img src="${p.poster}" alt="${p.title}">
                </div>
                <div class="related-info">
                    <div class="related-title">${p.title}</div>
                    <div class="related-year">${p.year}</div>
                </div>
            </a>
        `).join('');

        // 8. Generar Tags
        const sidebarTags = document.getElementById('sidebarTags');
        const movieTags = document.getElementById('movieTags');
        const allTags = [...new Set(posts.flatMap(p => p.tags))];

        // Tags de la película actual
        movieTags.innerHTML = movie.tags.map(t => `<span class="tag-pill">${t}</span>`).join('');

        // Todos los tags en el sidebar
        sidebarTags.innerHTML = allTags.map(t => `
            <a href="index.html" class="tag-pill">${t}</a>
        `).join('');

    } catch (error) {
        console.error('Error:', error);
        document.getElementById('heroTitle').textContent = 'Error al cargar los datos';
    }
}

init();
  </script>
</body>
</html>
